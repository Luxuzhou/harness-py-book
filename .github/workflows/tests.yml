name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            cases/data_compliance/target_service/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r cases/data_compliance/target_service/requirements.txt
      - name: Run framework tests
        run: python -B -m pytest tests -q -p no:cacheprovider
      - name: Run Chapter 10 service tests
        run: python -B -m pytest cases/data_compliance/target_service/tests -q -p no:cacheprovider
