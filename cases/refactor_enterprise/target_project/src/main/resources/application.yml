server:
  port: 8080
  servlet:
    context-path: /cp

spring:
  application:
    name: cp-system
  profiles:
    active: dev

  # MySQL主数据源
  datasource:
    url: jdbc:mysql://192.168.1.100:3306/cp_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: cp_user
    password: cp_pass_2024
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: cp-mysql-pool

    # ClickHouse数据源
    clickhouse:
      url: jdbc:clickhouse://192.168.1.101:8123/bi_db
      username: default
      password: ck_pass_2024
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

  # Redis配置
  data:
    redis:
      host: 192.168.1.102
      port: 6379
      password: redis_pass_2024
      database: 3
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Flex配置
mybatis-flex:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

# CP业务配置
cp:
  plan:
    max-items: 500
    cache-ttl: 3600
  monitor:
    check-interval: 300
    alarm-threshold: 3
  queue:
    max-retry: 3
    timeout: 5000
    consumer-group: cp-default

# SpringDoc配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 日志配置
logging:
  level:
    com.example.cp: DEBUG
    com.mybatisflex: DEBUG
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
