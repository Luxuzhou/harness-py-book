openapi: "3.0.3"
info:
  title: CP Intelligent Anomaly API
  description: |
    诊疗临床路径智能异常预警模块 — Java端(临床路径管理系统)暴露给Python端(诊疗数据分析服务)的REST API契约。
    此契约由 Architect Agent 审定，任何修改需经 Architect 审批。
  version: "1.0.0"
  contact:
    name: CP Team
    email: cp-team@example.com

servers:
  - url: http://localhost:8080
    description: 临床路径管理系统 Java 服务（开发环境）

paths:
  /api/v1/anomaly/rules:
    post:
      operationId: createAnomalyRule
      summary: 创建预警规则
      description: 为指定诊疗项目创建路径依从率预警规则
      tags:
        - anomaly-rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnomalyRuleCreateRequest"
      responses:
        "201":
          description: 规则创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyRuleResponse"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 该诊疗项目已存在预警规则
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/anomaly/rules/{test_item_id}:
    get:
      operationId: getAnomalyRule
      summary: 查询预警规则
      description: 根据诊疗项目ID查询其预警规则配置
      tags:
        - anomaly-rules
      parameters:
        - name: test_item_id
          in: path
          required: true
          description: 诊疗项目ID
          schema:
            type: string
            maxLength: 64
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyRuleResponse"
        "404":
          description: 未找到该诊疗项目的预警规则
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/anomaly/events:
    post:
      operationId: createAnomalyEvent
      summary: 记录异常事件
      description: |
        由 Python 分析引擎调用，当检测到异常预警条件时记录异常事件。
        此接口要求 X-Service-Token 头部认证。
      tags:
        - anomaly-events
      parameters:
        - name: X-Service-Token
          in: header
          required: true
          description: 服务间认证Token
          schema:
            type: string
        - name: X-Trace-Id
          in: header
          required: false
          description: 调用链路追踪ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnomalyEventCreateRequest"
      responses:
        "201":
          description: 异常事件记录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyEventResponse"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 认证失败（Token无效）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AnomalyRuleCreateRequest:
      type: object
      required:
        - test_item_id
        - test_item_name
        - target_value
        - sd_value
      properties:
        test_item_id:
          type: string
          maxLength: 64
          description: 诊疗项目ID
          example: "GLU-001"
        test_item_name:
          type: string
          maxLength: 128
          description: 诊疗项目名称
          example: "血糖 GLU"
        window_size:
          type: integer
          minimum: 3
          maximum: 20
          default: 5
          description: 路径依从率窗口大小
        consecutive_count:
          type: integer
          minimum: 2
          maximum: 10
          default: 3
          description: 连续超限判定次数
        threshold_multiplier:
          type: number
          format: double
          minimum: 0.5
          maximum: 3.0
          default: 1.5
          description: 控制限倍数（相对于SD）
        target_value:
          type: number
          format: double
          description: 目标值（靶值）
          example: 5.5
        sd_value:
          type: number
          format: double
          description: 标准差
          example: 0.3
        enabled:
          type: boolean
          default: true
          description: 是否启用

    AnomalyRuleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 规则ID
        test_item_id:
          type: string
        test_item_name:
          type: string
        window_size:
          type: integer
        consecutive_count:
          type: integer
        threshold_multiplier:
          type: number
          format: double
        target_value:
          type: number
          format: double
        sd_value:
          type: number
          format: double
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AnomalyEventCreateRequest:
      type: object
      required:
        - rule_id
        - test_item_id
        - triggered_at
        - severity
      properties:
        rule_id:
          type: integer
          format: int64
          description: 关联的预警规则ID
        test_item_id:
          type: string
          maxLength: 64
          description: 诊疗项目ID
        triggered_at:
          type: string
          format: date-time
          description: 异常预警触发时间
        severity:
          type: string
          enum:
            - WARNING
            - CRITICAL
          description: 严重程度
        moving_averages:
          type: array
          items:
            type: number
            format: double
          description: 触发时的路径依从率序列
        deviation_points:
          type: array
          items:
            $ref: "#/components/schemas/DeviationPoint"
          description: 超限点位信息
        message:
          type: string
          maxLength: 512
          description: 异常预警描述信息

    AnomalyEventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        rule_id:
          type: integer
          format: int64
        test_item_id:
          type: string
        triggered_at:
          type: string
          format: date-time
        severity:
          type: string
        message:
          type: string
        created_at:
          type: string
          format: date-time

    DeviationPoint:
      type: object
      properties:
        index:
          type: integer
          description: 超限点在序列中的位置索引
        moving_average:
          type: number
          format: double
          description: 该点的路径依从率
        upper_limit:
          type: number
          format: double
          description: 上控制限
        lower_limit:
          type: number
          format: double
          description: 下控制限
        direction:
          type: string
          enum:
            - HIGH
            - LOW
          description: 超限方向

    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
          description: 错误码
          example: "VALIDATION_FAILED"
        message:
          type: string
          description: 错误描述
          example: "window_size must be between 3 and 20"
        timestamp:
          type: string
          format: date-time
