openapi: "3.0.3"
info:
  title: SQC Intelligent Alarm API
  description: |
    检验质控智能报警模块 — Java端(H34)暴露给Python端(S37)的REST API契约。
    此契约由 Architect Agent 审定，任何修改需经 Architect 审批。
  version: "1.0.0"
  contact:
    name: SQC Team
    email: sqc-team@example.com

servers:
  - url: http://localhost:8080
    description: H34 Java 服务（开发环境）

paths:
  /api/v1/alarm/rules:
    post:
      operationId: createAlarmRule
      summary: 创建报警规则
      description: 为指定检验项目创建移动均值报警规则
      tags:
        - alarm-rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlarmRuleCreateRequest"
      responses:
        "201":
          description: 规则创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlarmRuleResponse"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 该检验项目已存在报警规则
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/alarm/rules/{test_item_id}:
    get:
      operationId: getAlarmRule
      summary: 查询报警规则
      description: 根据检验项目ID查询其报警规则配置
      tags:
        - alarm-rules
      parameters:
        - name: test_item_id
          in: path
          required: true
          description: 检验项目ID
          schema:
            type: string
            maxLength: 64
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlarmRuleResponse"
        "404":
          description: 未找到该检验项目的报警规则
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/alarm/events:
    post:
      operationId: createAlarmEvent
      summary: 记录报警事件
      description: |
        由 Python 分析引擎调用，当检测到报警条件时记录报警事件。
        此接口要求 X-Service-Token 头部认证。
      tags:
        - alarm-events
      parameters:
        - name: X-Service-Token
          in: header
          required: true
          description: 服务间认证Token
          schema:
            type: string
        - name: X-Trace-Id
          in: header
          required: false
          description: 调用链路追踪ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlarmEventCreateRequest"
      responses:
        "201":
          description: 报警事件记录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlarmEventResponse"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 认证失败（Token无效）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AlarmRuleCreateRequest:
      type: object
      required:
        - test_item_id
        - test_item_name
        - target_value
        - sd_value
      properties:
        test_item_id:
          type: string
          maxLength: 64
          description: 检验项目ID
          example: "GLU-001"
        test_item_name:
          type: string
          maxLength: 128
          description: 检验项目名称
          example: "血糖 GLU"
        window_size:
          type: integer
          minimum: 3
          maximum: 20
          default: 5
          description: 移动均值窗口大小
        consecutive_count:
          type: integer
          minimum: 2
          maximum: 10
          default: 3
          description: 连续超限判定次数
        threshold_multiplier:
          type: number
          format: double
          minimum: 0.5
          maximum: 3.0
          default: 1.5
          description: 控制限倍数（相对于SD）
        target_value:
          type: number
          format: double
          description: 目标值（靶值）
          example: 5.5
        sd_value:
          type: number
          format: double
          description: 标准差
          example: 0.3
        enabled:
          type: boolean
          default: true
          description: 是否启用

    AlarmRuleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 规则ID
        test_item_id:
          type: string
        test_item_name:
          type: string
        window_size:
          type: integer
        consecutive_count:
          type: integer
        threshold_multiplier:
          type: number
          format: double
        target_value:
          type: number
          format: double
        sd_value:
          type: number
          format: double
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AlarmEventCreateRequest:
      type: object
      required:
        - rule_id
        - test_item_id
        - triggered_at
        - severity
      properties:
        rule_id:
          type: integer
          format: int64
          description: 关联的报警规则ID
        test_item_id:
          type: string
          maxLength: 64
          description: 检验项目ID
        triggered_at:
          type: string
          format: date-time
          description: 报警触发时间
        severity:
          type: string
          enum:
            - WARNING
            - CRITICAL
          description: 严重程度
        moving_averages:
          type: array
          items:
            type: number
            format: double
          description: 触发时的移动均值序列
        breach_points:
          type: array
          items:
            $ref: "#/components/schemas/BreachPoint"
          description: 超限点位信息
        message:
          type: string
          maxLength: 512
          description: 报警描述信息

    AlarmEventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        rule_id:
          type: integer
          format: int64
        test_item_id:
          type: string
        triggered_at:
          type: string
          format: date-time
        severity:
          type: string
        message:
          type: string
        created_at:
          type: string
          format: date-time

    BreachPoint:
      type: object
      properties:
        index:
          type: integer
          description: 超限点在序列中的位置索引
        moving_average:
          type: number
          format: double
          description: 该点的移动均值
        upper_limit:
          type: number
          format: double
          description: 上控制限
        lower_limit:
          type: number
          format: double
          description: 下控制限
        direction:
          type: string
          enum:
            - HIGH
            - LOW
          description: 超限方向

    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
          description: 错误码
          example: "VALIDATION_FAILED"
        message:
          type: string
          description: 错误描述
          example: "window_size must be between 3 and 20"
        timestamp:
          type: string
          format: date-time
